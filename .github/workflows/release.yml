# SPDX-License-Identifier: Apache-2.0

name: Release to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # Required for creating releases
  id-token: write  # Required for trusted publishing to PyPI
  actions: read    # Required for checking test suite status

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chiltepin
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Verify test suite passed
        run: |
          echo "Checking if test suite passed on this commit..."
          # Query for test-suite workflow runs on this commit
          gh run list \
            --workflow=test-suite.yaml \
            --commit=${{ github.sha }} \
            --json conclusion,status \
            --limit 5 | \
            jq -e 'map(select(.status == "completed")) | .[0].conclusion == "success"' || {
              echo "❌ Test suite must pass before release!"
              echo "   Run: gh workflow run test-suite.yaml --ref main"
              echo "   Or wait for automatic test run on main branch"
              exit 1
            }
          echo "✓ Test suite passed on this commit"
        env:
          GH_TOKEN: ${{ github.token }}
      -
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      -
        name: Install dependencies
        run: pip install -e ".[test,docs,release]"
      -
        name: Run linting
        run: ruff check src/ tests/
      -
        name: Build documentation
        run: |
          rm -rf docs/_build
          LC_ALL=C python -m sphinx -b html docs docs/_build -W --keep-going
      -
        name: Build package
        run: python -m build
      -
        name: Check package metadata
        run: twine check dist/*
      -
        name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # SECURITY: Uses OIDC (no stored secrets) - recommended by PyPI
        # Action maintained by Python Packaging Authority (PyPA)
        # Setup: https://pypi.org/manage/account/publishing/
        # Alternative with API token:
        #   run: twine upload dist/*
        #   env:
        #     TWINE_USERNAME: __token__
        #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      -
        name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
