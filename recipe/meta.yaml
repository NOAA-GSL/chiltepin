# SPDX-License-Identifier: Apache-2.0

{% set version = "0.1.2" %}
{% set python_min = "3.10" %}

package:
  name: chiltepin
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/c/chiltepin/chiltepin-{{ version }}.tar.gz
  sha256: 771dbee9bcd04823a6da8d1e1fa03aeb8a44bab3ba20a65e81914e2079ace742

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  noarch: python
  entry_points:
    - chiltepin = chiltepin.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - globus-compute-sdk >=4.3.0,<4.7.0
    - globus-compute-endpoint >=4.3.0,<4.7.0  # [linux]
    - parsl >=2025.12.1

test:
  imports:
    - chiltepin
    - chiltepin.cli
    - chiltepin.configure
    - chiltepin.endpoint
    - chiltepin.tasks
    - chiltepin.data
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - chiltepin --help
    - pip check

about:
  home: https://github.com/NOAA-GSL/chiltepin
  license: Apache-2.0
  license_file: LICENSE
  summary: Federated NWP Workflow Tools
  description: |
    Chiltepin is a Python library for exploring federated workflow capabilities
    using Parsl and Globus Compute. It provides tools and demonstrations for
    implementing distributed scientific workflows on HPC systems.
  doc_url: https://chiltepin.readthedocs.io
  dev_url: https://github.com/NOAA-GSL/chiltepin

extra:
  recipe-maintainers:
    - christopherwharrop-noaa
