# SPDX-License-Identifier: Apache-2.0

name: Release to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # Required for creating releases
  id-token: write  # Required for trusted publishing to PyPI

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chiltepin
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      -
        name: Install dependencies
        run: pip install -e ".[test,docs,release]"
      -
        name: Run linting
        run: ruff check src/ tests/
      -
        name: Build documentation
        run: cd docs && make clean html
      -
        name: Build package
        run: python -m build
      -
        name: Check package metadata
        run: twine check dist/*
      -
        name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # SECURITY: Uses OIDC (no stored secrets) - recommended by PyPI
        # Action maintained by Python Packaging Authority (PyPA)
        # Setup: https://pypi.org/manage/account/publishing/
        # Alternative with API token:
        #   run: twine upload dist/*
        #   env:
        #     TWINE_USERNAME: __token__
        #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      -
        name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
