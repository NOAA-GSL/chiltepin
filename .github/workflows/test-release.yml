# SPDX-License-Identifier: Apache-2.0

name: Test Release to TestPyPI

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for trusted publishing to TestPyPI

jobs:
  test-release:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/chiltepin
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      -
        name: Install dependencies
        run: pip install -e ".[test,docs,release]"
      -
        name: Run linting
        run: ruff check src/ tests/
      -
        name: Build documentation
        run: cd docs && make clean html
      -
        name: Build package
        run: python -m build
      -
        name: Check package metadata
        run: twine check dist/*
      -
        name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
        # SECURITY: Uses OIDC (no stored secrets) - recommended by PyPI
        # Action maintained by Python Packaging Authority (PyPA)
        # Setup: https://test.pypi.org/manage/account/publishing/
        # Alternative with API token:
        #   run: twine upload --repository testpypi --skip-existing dist/*
        #   env:
        #     TWINE_USERNAME: __token__
        #     TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
